<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>PinVault</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <!-- Login -->
  <section id="view-login" class="view" hidden>
    <div class="login-box">
      <h1>PinVault</h1>
      <p class="muted">Enter the shared passphrase</p>
      <form id="login-form">
        <input type="password" id="login-passphrase" placeholder="Passphrase"
               autocomplete="current-password" required>
        <button type="submit" class="btn btn-primary btn-block">Unlock</button>
      </form>
      <p id="login-error" class="error" hidden></p>
    </div>
  </section>

  <!-- Identify (home) -->
  <section id="view-identify" class="view" hidden>
    <header class="topbar"><h1>Identify</h1></header>
    <div id="identify-start" class="identify-start">
      <label class="capture-button" for="capture-input">
        <span class="capture-icon">&#128247;</span>
        <span>Photograph a pin</span>
      </label>
      <input type="file" id="capture-input" accept="image/*" capture="environment" hidden>
    </div>
    <div id="identify-busy" class="identify-busy" hidden>
      <img id="identify-preview" alt="Captured pin">
      <p id="identify-status" class="muted">Analyzing&hellip;</p>
    </div>
    <div id="identify-result" hidden></div>
  </section>

  <!-- Collection browser -->
  <section id="view-collection" class="view" hidden>
    <header class="topbar"><h1>Collection</h1><span id="collection-count" class="muted"></span></header>
    <div class="filters">
      <input type="search" id="search-input" placeholder="Search pins&hellip;">
      <div class="filter-row">
        <select id="filter-character"><option value="">Character</option></select>
        <select id="filter-franchise"><option value="">Franchise</option></select>
        <select id="filter-maker"><option value="">Maker</option></select>
        <select id="filter-series"><option value="">Series</option></select>
      </div>
    </div>
    <div id="pin-grid" class="pin-grid"></div>
    <p id="collection-empty" class="muted center" hidden>No pins yet. Photograph one to get started!</p>
  </section>

  <!-- Pin detail / edit -->
  <section id="view-detail" class="view" hidden>
    <header class="topbar">
      <button class="btn btn-ghost" id="detail-back">&larr; Back</button>
      <h1>Pin</h1>
    </header>
    <div id="detail-body"></div>
  </section>

  <!-- Add / edit form -->
  <section id="view-form" class="view" hidden>
    <header class="topbar">
      <button class="btn btn-ghost" id="form-back">&larr; Back</button>
      <h1 id="form-title">Add pin</h1>
    </header>
    <div id="form-body"></div>
  </section>

  <!-- Removed pins ledger -->
  <section id="view-removed" class="view" hidden>
    <header class="topbar"><h1>Traded away</h1></header>
    <div id="removed-list" class="pin-grid"></div>
    <p id="removed-empty" class="muted center" hidden>No removed pins.</p>
  </section>

  <nav id="tabbar" hidden>
    <button data-view="identify" class="tab active">&#128247;<span>Identify</span></button>
    <button data-view="collection" class="tab">&#128204;<span>Collection</span></button>
    <button data-view="removed" class="tab">&#128260;<span>Traded</span></button>
  </nav>

  <div id="toast" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
